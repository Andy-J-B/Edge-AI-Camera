name: RTL CI

on:
  push:
    paths:
      - hardware/**
      - test/**
      - Makefile
  pull_request:
    paths:
      - hardware/**
      - test/**
      - Makefile

jobs:
  sim:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Verilator
        run: sudo apt-get update && sudo apt-get install -y verilator cmake python3-pip

      - name: Install Python dependencies
        run: pip3 install Pillow

      - name: Configure
        run: make configure

      - name: Build
        run: make build

      - name: Run simulation
        run: make run
